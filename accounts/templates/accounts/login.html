<!DOCTYPE html>
<html>
<head>
    <title>Login | UMS</title>
    <style>
        body {
            background: #1f2a40;
            font-family: Arial;
        }
        .login-box {
            width: 350px;
            margin: 120px auto;
            background: white;
            padding: 30px;
            border-radius: 6px;
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #1abc9c;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>UMS Login</h2>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
